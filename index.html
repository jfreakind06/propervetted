    <g onClick={() => setSelectedService(name)} style={{ cursor: "pointer" }} transform={`translate(${x},${y})`}>
      <rect width="148" height="58" rx="8" fill={selectedService === name ? color + "22" : C.card} stroke={selectedService === name ? color : C.border} strokeWidth={selectedService === name ? 2 : 1} />
      <text x="74" y="25" textAnchor="middle" fill={color} fontSize="12" fontWeight="700" fontFamily="'JetBrains Mono',monospace">{icon} {name}</text>
      <text x="74" y="43" textAnchor="middle" fill={C.dim} fontSize="9.5" fontFamily="'Inter',sans-serif">{desc}</text>
    </g>
  );

  const Arr = ({ x1, y1, x2, y2, color = C.muted, dash = false }) => (
    <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth="1.2" strokeDasharray={dash ? "5,3" : "none"} markerEnd="url(#ah)" opacity="0.5" />
  );

  return (
    <div style={{ background: C.bg, minHeight: "100vh", fontFamily: "'Inter',system-ui,sans-serif", color: C.text }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:${C.bg}}::-webkit-scrollbar-thumb{background:${C.border};border-radius:3px}

      <div style={{ padding: "28px 28px 0", borderBottom: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
          <div style={{ width: 36, height: 36, borderRadius: 8, background: `linear-gradient(135deg,${C.accent},${C.accentDim})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>📦</div>
          <div>
            <h1 style={{ fontSize: 20, fontWeight: 700, letterSpacing: "-0.02em" }}>StoreFlow — On-Demand Storage Backend</h1>
            <p style={{ fontSize: 12, color: C.dim }}>We pick up, store, and deliver your stuff · Full-service storage platform</p>
          </div>
        </div>
        <div style={{ display: "flex", gap: 2, marginTop: 16, overflowX: "auto" }}>
          {tabs.map((t, i) => (
            <button key={t} onClick={() => { setTab(i); setSelectedService(null); }} style={{
              padding: "9px 16px", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap",
              background: tab === i ? C.card : "transparent", color: tab === i ? C.accent : C.dim,
              border: "none", borderRadius: "7px 7px 0 0", cursor: "pointer",
              borderBottom: tab === i ? `2px solid ${C.accent}` : "2px solid transparent",
            }}>{t}</button>
          ))}
        </div>
      </div>

      <div style={{ padding: 28 }}>

        {/* ═══ TAB 0: SYSTEM OVERVIEW ═══ */}
        {tab === 0 && (
          <div style={{ display: "flex", gap: 20 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <svg viewBox="0 0 840 680" style={{ width: "100%", background: C.card, borderRadius: 14, border: `1px solid ${C.border}` }}>
                <defs>
                  <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
                    <polygon points="0 0,7 2.5,0 5" fill={C.muted} />
                  </marker>
                </defs>

                {/* Layer labels */}
                {[
                  { y: 22, label: "CLIENT APPS (4 interfaces)" },
                  { y: 112, label: "API GATEWAY" },
                  { y: 210, label: "BACKEND SERVICES" },
                  { y: 490, label: "DATA & INFRASTRUCTURE" },
                ].map(l => (
                  <g key={l.label}>
                    <text x="16" y={l.y} fill={C.muted} fontSize="10" fontWeight="600" fontFamily="'JetBrains Mono',monospace" opacity="0.5">{l.label}</text>
                    <line x1="14" y1={l.y + 8} x2="826" y2={l.y + 8} stroke={C.border} strokeDasharray="3,3" opacity="0.3" />
                  </g>
                ))}

                {/* Client Apps */}
                {[
                  { icon: "📱", label: "Customer App", sub: "iOS / Android / Web", x: 50, color: C.green },
                  { icon: "🚗", label: "Driver App", sub: "iOS / Android", x: 245, color: C.orange },
                  { icon: "🏭", label: "Warehouse Dashboard", sub: "Web / Tablet", x: 460, color: C.cyan },
                  { icon: "⚙️", label: "Admin Panel", sub: "Web", x: 670, color: C.purple },
                ].map(c => (
                  <g key={c.label}>
                    <rect x={c.x} y={38} width="140" height="46" rx="7" fill={C.bg} stroke={c.color} strokeWidth="1" opacity="0.8" />
                    <text x={c.x + 70} y={56} textAnchor="middle" fill={c.color} fontSize="11" fontWeight="600">{c.icon} {c.label}</text>
                    <text x={c.x + 70} y={72} textAnchor="middle" fill={C.muted} fontSize="9">{c.sub}</text>
                  </g>
                ))}

                {/* Arrows to gateway */}
                {[120, 315, 530, 740].map(x => (
                  <Arr key={x} x1={x} y1={84} x2={420} y2={125} color={C.accent} />
                ))}

                {/* Gateway + Auth */}
                <SBox name="API Gateway" icon="🔀" color={C.accent} desc="Route · Auth · Rate Limit" x={346} y={125} />
                <SBox name="Auth Service" icon="🔐" color={C.red} desc="JWT · Roles · Login" x={570} y={125} />
                <Arr x1={494} y1={154} x2={570} y2={154} color={C.red} />

                {/* Service connections from gateway */}
                {[88, 248, 408, 568, 660].map(x => (
                  <Arr key={x} x1={420} y1={183} x2={x + 74} y2={228} color={C.muted} />
                ))}

                {/* Row 1 Services */}
                <SBox name="Order Service" icon="📋" color={C.accent} desc="Bookings · State · Core" x={88} y={228} />
                <SBox name="Inventory Service" icon="📊" color={C.cyan} desc="Bins · Capacity · Items" x={248} y={228} />
                <SBox name="Driver Service" icon="🚗" color={C.orange} desc="Dispatch · Fleet · GPS" x={408} y={228} />
                <SBox name="Payment Service" icon="💳" color={C.pink} desc="Stripe · Billing · Fees" x={568} y={228} />

                {/* Row 2 Services */}
                <SBox name="Notification Service" icon="🔔" color={C.purple} desc="Push · Email · SMS" x={88} y={340} />
                <SBox name="Tracking Service" icon="📍" color={C.green} desc="Real-time · GPS · ETA" x={248} y={340} />

                {/* Message Queue */}
                <rect x={440} y={330} width="350" height="70" rx="10" fill={C.accent + "08"} stroke={C.accent} strokeWidth="1" strokeDasharray="4,3" />
                <text x={615} y={355} textAnchor="middle" fill={C.accent} fontSize="12" fontWeight="700" fontFamily="'JetBrains Mono',monospace">📨 Message Queue (RabbitMQ / Kafka)</text>
                <text x={615} y={375} textAnchor="middle" fill={C.dim} fontSize="9.5">ORDER_CREATED · DRIVER_ASSIGNED · ITEMS_STORED · RETURN_REQUESTED</text>
                <text x={615} y={390} textAnchor="middle" fill={C.dim} fontSize="9.5">All services publish & consume events asynchronously</text>

                {/* Inter-service arrows */}
                <Arr x1={236} y1={286} x2={322} y2={286} color={C.cyan} />
                <text x={275} y={280} textAnchor="middle" fill={C.cyan} fontSize="8" opacity="0.7">check bins</text>

                <Arr x1={236} y1={270} x2={642} y2={252} color={C.pink} dash />
                <Arr x1={162} y1={286} x2={162} y2={340} color={C.accent} dash />
                <Arr x1={322} y1={370} x2={440} y2={360} color={C.accent} dash />

                {/* Infrastructure */}
                {[
                  { icon: "🐘", label: "PostgreSQL", sub: "Orders·Users·Bins·Trips", x: 50, color: C.blue },
                  { icon: "⚡", label: "Redis", sub: "Cache · Sessions · GPS", x: 220, color: C.red },
                  { icon: "☁️", label: "AWS S3 + CDN", sub: "Photos · Proofs", x: 390, color: C.green },
                  { icon: "📊", label: "Monitoring", sub: "Grafana · Logs · Alerts", x: 560, color: C.purple },
                  { icon: "⏰", label: "Cron / Scheduler", sub: "Monthly billing", x: 710, color: C.accent },
                ].map(d => (
                  <g key={d.label}>
                    <rect x={d.x} y={510} width="150" height="50" rx="8" fill={C.bg} stroke={d.color} strokeWidth="1" opacity="0.7" />
                    <text x={d.x + 75} y={530} textAnchor="middle" fill={d.color} fontSize="11" fontWeight="600" fontFamily="'JetBrains Mono',monospace">{d.icon} {d.label}</text>
                    <text x={d.x + 75} y={546} textAnchor="middle" fill={C.muted} fontSize="9">{d.sub}</text>
                  </g>
                ))}

                {/* Communication box */}
                <rect x={100} y={590} width={640} height={70} rx="10" fill={C.green + "08"} stroke={C.green} strokeWidth="1" strokeDasharray="4,3" />
                <text x={420} y={614} textAnchor="middle" fill={C.green} fontSize="12" fontWeight="700" fontFamily="'JetBrains Mono',monospace">
                  HOW FRONTEND ↔ BACKEND TALK
                </text>
                <text x={420} y={632} textAnchor="middle" fill={C.dim} fontSize="10">
                  REST APIs (HTTPS/JSON) — all CRUD operations & data fetching
                </text>
                <text x={420} y={648} textAnchor="middle" fill={C.dim} fontSize="10">
                  WebSockets — live driver GPS, new assignments, warehouse alerts, real-time notifications
                </text>
              </svg>
              <p style={{ fontSize: 10, color: C.muted, marginTop: 6, textAlign: "center" }}>Click any service to see details →</p>
            </div>

            {/* Detail Panel */}
            <div style={{ width: 300, flexShrink: 0 }}>
              {selectedService && serviceInfo[selectedService] ? (
                <div style={{ background: C.card, borderRadius: 10, border: `1px solid ${C.border}`, padding: 18, position: "sticky", top: 16 }}>
                  <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 3 }}>{selectedService}</h3>
                  <p style={{ fontSize: 11, color: C.accent, fontFamily: "'JetBrains Mono',monospace", marginBottom: 12 }}>{serviceInfo[selectedService].tech}</p>
                  <p style={{ fontSize: 12, color: C.dim, lineHeight: 1.5, marginBottom: 14, padding: 10, background: C.bg, borderRadius: 6 }}>{serviceInfo[selectedService].what}</p>
                  <h4 style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Responsibilities</h4>
                  {serviceInfo[selectedService].responsibilities.map(r => (
                    <div key={r} style={{ fontSize: 12, color: C.text, padding: "5px 0", borderBottom: `1px solid ${C.border}22` }}>
                      <span style={{ color: C.green, marginRight: 6 }}>▸</span>{r}
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{ background: C.card, borderRadius: 10, border: `1px solid ${C.border}`, padding: 20, textAlign: "center" }}>
                  <div style={{ fontSize: 36, marginBottom: 10 }}>👈</div>
                  <p style={{ fontSize: 13, color: C.dim }}>Click a service in the diagram to see its tech stack, role, and responsibilities.</p>

                  <div style={{ marginTop: 20, textAlign: "left", padding: 14, background: C.bg, borderRadius: 8, border: `1px solid ${C.border}` }}>
                    <h4 style={{ fontSize: 11, color: C.accent, marginBottom: 8 }}>4 CLIENT APPS → 1 BACKEND</h4>
                    {[
                      { icon: "📱", label: "Customer App", desc: "Book storage, track driver, view items, request returns" },
                      { icon: "🚗", label: "Driver App", desc: "Get assignments, navigate, scan items, confirm pickup/delivery" },
                      { icon: "🏭", label: "Warehouse Dashboard", desc: "See incoming, scan into bins, prepare returns" },
                      { icon: "⚙️", label: "Admin Panel", desc: "Manage everything — users, warehouses, pricing, reports" },
                    ].map(a => (
                      <div key={a.label} style={{ marginBottom: 8 }}>
                        <div style={{ fontSize: 12, fontWeight: 600 }}>{a.icon} {a.label}</div>
                        <div style={{ fontSize: 11, color: C.dim }}>{a.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ═══ TAB 1: DATA FLOW ═══ */}
        {tab === 1 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <p style={{ fontSize: 13, color: C.dim, marginBottom: 4 }}>Step-by-step: how data moves through the system for each core user journey. This is exactly what happens on each API call.</p>
            {flows.map((flow, fi) => (
              <div key={flow.title} style={{ background: C.card, borderRadius: 10, border: `1px solid ${C.border}`, overflow: "hidden" }}>
                <div onClick={() => setExpandedFlow(expandedFlow === fi ? -1 : fi)} style={{
                  padding: "12px 18px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center",
                  background: expandedFlow === fi ? flow.color + "10" : "transparent", borderBottom: expandedFlow === fi ? `1px solid ${C.border}` : "none",
                }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: flow.color }}>{flow.title}</span>
                  <span style={{ fontSize: 18, color: C.muted, transform: expandedFlow === fi ? "rotate(180deg)" : "none", transition: "0.2s" }}>▾</span>
                </div>
                {expandedFlow === fi && (
                  <div style={{ padding: "12px 18px" }}>
                    {flow.steps.map((s, si) => (
                      <div key={si} style={{ display: "flex", gap: 12, marginBottom: 12, alignItems: "flex-start" }}>
                        <div style={{
                          minWidth: 28, height: 28, borderRadius: "50%", background: s.color + "20", color: s.color,
                          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, marginTop: 2,
                        }}>{si + 1}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                            <span style={{ fontSize: 11, fontWeight: 700, color: s.color, background: s.color + "15", padding: "2px 8px", borderRadius: 4 }}>{s.actor}</span>
                            <code style={{ fontSize: 11, color: C.accent, fontFamily: "'JetBrains Mono',monospace" }}>{s.action}</code>
                          </div>
                          <p style={{ fontSize: 12, color: C.dim, marginTop: 3 }}>{s.detail}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* ═══ TAB 2: DATABASE SCHEMA ═══ */}
        {tab === 2 && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(360px, 1fr))", gap: 16 }}>
            {schema.map(table => (
              <div key={table.name} style={{ background: C.card, borderRadius: 10, border: `1px solid ${C.border}`, overflow: "hidden" }}>
                <div style={{ padding: "10px 14px", background: table.color + "12", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 7, height: 7, borderRadius: "50%", background: table.color }} />
                    <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: table.color }}>{table.name}</span>
                  </div>
                  <span style={{ fontSize: 10, color: C.muted }}>{table.desc}</span>
                </div>
                <div style={{ padding: "2px 0" }}>
                  {table.fields.map(f => (
                    <div key={f.n} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 14px", borderBottom: `1px solid ${C.border}11` }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                        {f.pk && <span style={{ fontSize: 8, background: C.accent, color: C.bg, padding: "1px 3px", borderRadius: 2, fontWeight: 700 }}>PK</span>}
                        {f.fk && <span style={{ fontSize: 8, background: C.purple, color: "#fff", padding: "1px 3px", borderRadius: 2, fontWeight: 700 }}>FK</span>}
                        <span style={{ fontSize: 12, fontFamily: "'JetBrains Mono',monospace", color: C.text }}>{f.n}</span>
                      </div>
                      <span style={{ fontSize: 10, color: C.muted, fontFamily: "'JetBrains Mono',monospace", textAlign: "right", maxWidth: "55%" }}>{f.t}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            {/* Schema notes */}
            <div style={{ gridColumn: "1/-1", background: C.card, borderRadius: 10, border: `1px solid ${C.border}`, padding: 18 }}>
              <h3 style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 10 }}>📐 Key Schema Design Decisions</h3>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, fontSize: 12, color: C.dim, lineHeight: 1.5 }}>
                <div><strong style={{ color: C.text }}>Order status state machine</strong> — The <code style={{ color: C.accent }}>orders.status</code> field tracks the full lifecycle: pending → driver_assigned → pickup_in_progress → in_transit → stored → retrieval_requested → out_for_delivery → returned. Each transition triggers events.</div>
                <div><strong style={{ color: C.text }}>Bin-level tracking</strong> — Every physical bin has its own record in <code style={{ color: C.cyan }}>bins</code> with a human-readable label (e.g., "A-3-17" = Aisle A, Shelf 3, Position 17). Warehouse staff scans items directly into bins.</div>
                <div><strong style={{ color: C.text }}>Item barcodes</strong> — Each <code style={{ color: C.accent }}>order_item</code> gets a unique barcode. Drivers scan on pickup, warehouse scans into bins. This creates a verifiable chain of custody from customer's home to specific bin.</div>
                <div><strong style={{ color: C.text }}>Warehouse capacity counters</strong> — <code style={{ color: C.green }}>warehouses</code> stores both total and available counts per bin size, updated atomically. This enables instant availability checks without counting individual bin records.</div>
              </div>
            </div>
          </div>
        )}

        {/* ═══ TAB 3: API CONTRACTS ═══ */}
        {tab === 3 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <p style={{ fontSize: 13, color: C.dim, marginBottom: 4 }}>Every API endpoint organized by which client app uses it. This is what the frontend team needs to build against.</p>
            {apis.map(group => (
              <div key={group.group} style={{ background: C.card, borderRadius: 10, border: `1px solid ${C.border}`, overflow: "hidden" }}>
                <div style={{ padding: "10px 18px", background: group.color + "10", borderBottom: `1px solid ${C.border}` }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: group.color }}>{group.group}</span>
                </div>
                {group.endpoints.map(ep => (
                  <div key={ep.p} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 18px", borderBottom: `1px solid ${C.border}11` }}>
                    <span style={{
                      fontSize: 9, fontWeight: 700, fontFamily: "'JetBrains Mono',monospace",
                      background: (mColors[ep.m] || C.text) + "20", color: mColors[ep.m] || C.text,
                      padding: "2px 7px", borderRadius: 3, minWidth: 38, textAlign: "center",
                    }}>{ep.m}</span>
                    <span style={{ fontSize: 12, fontFamily: "'JetBrains Mono',monospace", color: C.text, minWidth: 300 }}>{ep.p}</span>
                    <span style={{ fontSize: 11, color: C.dim }}>{ep.d}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* ═══ TAB 4: SCALING PLAN ═══ */}
        {tab === 4 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {[
              {
                phase: "Phase 1 — MVP (0–5K users, 1 warehouse)",
                color: C.green,
                items: [
                  { t: "Modular monolith", d: "All services in one deployable Node.js app, but with clean module boundaries (orders/, inventory/, drivers/ folders). Can extract into microservices later." },
                  { t: "Single PostgreSQL instance", d: "One database with all tables. Add read replica when query load increases. Use connection pooling (PgBouncer) from day one." },
                  { t: "Redis for real-time", d: "Driver GPS positions stored in Redis with 5-second TTL updates. Also used for session cache and bin availability cache." },
                  { t: "Simple driver dispatch", d: "Find nearest available driver using Haversine formula on lat/lng. No need for complex routing algorithms yet." },
                  { t: "Stripe for payments", d: "Stripe Checkout for initial payments, Stripe Billing for recurring monthly storage charges. Handles PCI compliance for you." },
                ],
              },
              {
                phase: "Phase 2 — Growth (5K–50K users, 3–5 warehouses)",
                color: C.accent,
                items: [
                  { t: "Extract Driver & Order services", d: "These change fastest. Break them into independent services with their own databases. Communicate via RabbitMQ events." },
                  { t: "PostGIS for geo-queries", d: "Enable PostGIS extension. Index customer locations and warehouse positions for efficient nearest-warehouse and driver-matching queries." },
                  { t: "Multi-warehouse routing", d: "Order Service now picks the optimal warehouse based on: proximity to customer, available bin capacity, and driver availability." },
                  { t: "Background job processing", d: "Bull/BullMQ (Redis-based) for: monthly billing runs, photo processing, report generation, driver payout calculations." },
                ],
              },
              {
                phase: "Phase 3 — Scale (50K+ users, 10+ warehouses)",
                color: C.purple,
                items: [
                  { t: "Full microservices + Kafka", d: "All services independent. Kafka for event streaming. CQRS where needed (separate read/write models for high-traffic queries)." },
                  { t: "Database per service", d: "Each microservice owns its data. Order Service has its DB, Inventory has its DB. Sync via events. Eliminates cross-service DB coupling." },
                  { t: "Multi-region deployment", d: "Deploy to regions near your warehouses. Route customers to nearest region. Global load balancing with failover." },
                  { t: "Advanced driver matching", d: "Factor in driver capacity (van vs car), current route optimization, predicted demand, and surge pricing during peak times." },
                  { t: "Data warehouse + analytics", d: "Stream events to data warehouse (BigQuery/Redshift) for business intelligence: demand forecasting, warehouse utilization, driver efficiency." },
                ],
              },
            ].map(phase => (
              <div key={phase.phase} style={{ background: C.card, borderRadius: 10, border: `1px solid ${C.border}`, overflow: "hidden" }}>
                <div style={{ padding: "12px 18px", background: phase.color + "10", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 9, height: 9, borderRadius: "50%", background: phase.color }} />
                  <span style={{ fontSize: 14, fontWeight: 700, color: phase.color }}>{phase.phase}</span>
                </div>
                <div style={{ padding: 16, display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 12 }}>
                  {phase.items.map(item => (
                    <div key={item.t} style={{ padding: 14, background: C.bg, borderRadius: 8, border: `1px solid ${C.border}` }}>
                      <h4 style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 4 }}>{item.t}</h4>
                      <p style={{ fontSize: 11, color: C.dim, lineHeight: 1.5 }}>{item.d}</p>
                    </div>
                  ))}
                </div>
              </div>
            ))}

            {/* Targets */}
            <div style={{ background: C.card, borderRadius: 10, border: `1px solid ${C.border}`, padding: 18 }}>
              <h3 style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 14 }}>📊 Performance Targets</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12 }}>
                {[
                  { m: "API Latency p95", t: "< 200ms", i: "⚡" },
                  { m: "Driver GPS Update", t: "Every 5s", i: "📍" },
                  { m: "Bin Check Query", t: "< 50ms", i: "📊" },
                  { m: "Uptime SLA", t: "99.9%", i: "✅" },
                  { m: "Notification Delay", t: "< 3s", i: "🔔" },
                ].map(m => (
                  <div key={m.m} style={{ textAlign: "center", padding: 14, background: C.bg, borderRadius: 8, border: `1px solid ${C.border}` }}>
                    <div style={{ fontSize: 24, marginBottom: 6 }}>{m.i}</div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: C.accent, fontFamily: "'JetBrains Mono',monospace" }}>{m.t}</div>
                    <div style={{ fontSize: 10, color: C.muted, marginTop: 3 }}>{m.m}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(StorageArchitecture));
  </script>
</body>
